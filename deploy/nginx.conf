# nginx configuration for VideoCall application
# Place this on the VPS at /etc/nginx/sites-available/videocall and symlink to sites-enabled

server {
    listen 80;
    server_name 1558360.hosted-by.xorek.cloud;

    # redirect HTTP to HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name 1558360.hosted-by.xorek.cloud;

    ssl_certificate      /etc/letsencrypt/live/1558360.hosted-by.xorek.cloud/fullchain.pem;
    ssl_certificate_key  /etc/letsencrypt/live/1558360.hosted-by.xorek.cloud/privkey.pem;
    include              /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam          /etc/letsencrypt/ssl-dhparams.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400;
    }
}
